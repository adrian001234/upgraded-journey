name: Credit Reminder Bot

on:
  schedule:
    - cron: "*/10 * * * *"
    - cron: "30 18 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine mode
        id: mode
        run: |
          MINUTE=$(date -u +%M)
          HOUR=$(date -u +%H)
          if [ "$HOUR" == "18" ] && [ "$MINUTE" == "30" ]; then
            echo "mode=reset" >> "$GITHUB_OUTPUT"
          else
            echo "mode=check" >> "$GITHUB_OUTPUT"
          fi

      - name: Run reminder script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/reminder.py ${{ steps.mode.outputs.mode }}
